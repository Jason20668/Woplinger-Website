<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gallery - Marlboro HS Boys Lacrosse</title>
  <link rel="stylesheet" href="Gallery.css">
</head>

<body>

  <header class="navbar">
    <div class="nav-left">
      <img src="imgs/Logo.png" class="logo">
      <a href="index.html">Home</a>
      <a href="Stats.html">Team</a>
      <a href="Info.html">Information</a>
    </div>
    <div class="nav-right">
      <a href="Schedule.html">Schedule</a>
      <a href="Gallery.html">Gallery</a>
      <a href="Instagram.html">Instagram</a>
    </div>
  </header>

  <section class="gallery-page">
    <div class="container">

      <div class="filter-controls">
        <button class="filter-btn active" data-filter="all">All Photos</button>
        <button class="filter-btn" data-filter="gh">Game Highlights</button>
        <button class="filter-btn" data-filter="tp">Team Photos</button>
      </div>

      <div class="gallery-grid" id="galleryGrid">
        <p class="loading-msg">Loading photos...</p>
      </div>

    </div>
  </section>

  <!-- Lightbox -->
  <div class="lightbox" id="lightbox">
    <button class="lightbox-close" id="lightboxClose">&times;</button>
    <img class="lightbox-img" id="lightboxImg" src="" alt="">
    <div class="lightbox-caption" id="lightboxCaption"></div>
  </div>

  <footer class="footer">
    <div class="instagram-icon">
      <img src="imgs/Instagram_Logo.jpg" alt="Instagram">
    </div>
    <p>woplinger@frhsd.com</p>
  </footer>

  <script src="Gallery.js"></script>
</body>

</html>
